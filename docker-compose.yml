services:
  # ──────────────────────────────
  # PostgreSQL (Label Studio DB)
  # ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mlops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labelstudio}
      POSTGRES_USER: ${POSTGRES_USER:-labelstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labelstudio_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labelstudio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────
  # Label Studio
  # ──────────────────────────────
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: mlops-label-studio
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_DB: default
      POSTGRE_NAME: ${POSTGRES_DB:-labelstudio}
      POSTGRE_USER: ${POSTGRES_USER:-labelstudio}
      POSTGRE_PASSWORD: ${POSTGRES_PASSWORD:-labelstudio_password}
      POSTGRE_HOST: postgres
      POSTGRE_PORT: 5432
      LABEL_STUDIO_HOST: http://localhost:8080
      LABEL_STUDIO_USERNAME: ${LABEL_STUDIO_USERNAME:-admin@mlops.local}
      LABEL_STUDIO_PASSWORD: ${LABEL_STUDIO_PASSWORD:-adminpassword}
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /data
    volumes:
      - ./data/label_studio:/label-studio/data
      - ./data:/data:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ──────────────────────────────
  # YOLO ML Backend (auto-labeling)
  # ──────────────────────────────
  ml-backend:
    build:
      context: ./services
      dockerfile: ml_backend/Dockerfile
    container_name: mlops-ml-backend
    depends_on:
      label-studio:
        condition: service_healthy
    environment:
      LABEL_STUDIO_HOST: http://label-studio:8080
      LABEL_STUDIO_API_KEY: ${LABEL_STUDIO_API_KEY:-}
      YOLO_PRETRAINED_MODEL: ${YOLO_PRETRAINED_MODEL:-yolo11n.pt}
      LABEL_STUDIO_ML_BACKEND_V2: "false"
    volumes:
      - ./data:/data
      - ./models:/models
    ports:
      - "9090:9090"
    restart: "no"

  # ──────────────────────────────
  # MLflow
  # ──────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: mlops-mlflow
    command: >
      bash -c "pip install mlflow==2.15.0 gunicorn --quiet &&
               mkdir -p /mlflow/artifacts &&
               MLFLOW_BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
               MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
               gunicorn -b 0.0.0.0:5000 -w 2 --timeout 120 --preload mlflow.server:app"
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - ./mlflow:/mlflow
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  # ──────────────────────────────
  # FastAPI (Orchestrator)
  # ──────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: mlops-api
    depends_on:
      label-studio:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      LABEL_STUDIO_HOST: http://label-studio:8080
      LABEL_STUDIO_API_KEY: ${LABEL_STUDIO_API_KEY:-}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ML_BACKEND_URL: http://ml-backend:9090
      DATA_ROOT: /data
      MODELS_ROOT: /models
    volumes:
      - ./data:/data
      - ./models:/models
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
